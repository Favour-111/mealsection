<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
    />
    <link rel="stylesheet" href="./login.css" />
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
    crossorigin="anonymous"
  />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <style>
      @media screen and (-webkit-min-device-pixel-ratio: 0) {
        select,
        textarea,
        input {
          font-size: 16px;
        }
      }
      img {
        margin-bottom: 80px !important;
      }
    </style>
    <div class="body">
      <div class="header">
        <img src="./images/logowhite.jpg" width="100px" alt="" />
      </div>
      <div id="login-form" class="form">
        <div class="d-flex align-items-center">
        <input
          type="password"
          id="password-input"
          placeholder="Enter password"
          oninput="validatePassword()"
        /><i class="fas fa-eye" id="toggle-password"></i><br />
      </div>
        <button
          id="login-btn"
          class="loginBtn"
          onclick="redirectToAnotherPage()"
          disabled
        >
          <i class="fa-solid fa-user"></i> Login
        </button>
      </div>
      <div id="scroll-container">
        <div id="scroll-text">
          The meal section website will be accessible from 12 AM to 7 PM. Orders placed after 7 PM will not be delivered.
        <div>
      </div>
    </div>
    <script src="./javascript/login.js"></script>
    <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"
  ></script>
  </body>
</html>
