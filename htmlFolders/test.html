<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Login</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f8f9fa;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .login-container {
        background-color: #fff;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        width: 100%;
        text-align: center;
        position: relative;
      }
      .login-container h2 {
        margin-bottom: 30px;
        color: #a4161a;
        font-weight: 600;
        font-size: 24px;
      }
      .login-form input[type="password"] {
        width: calc(100% - 40px);
        padding: 14px;
        margin-bottom: 20px;
        border: none;
        border-radius: 10px;
        background-color: #f8f9fa;
        border: 2px solid #a4161a;
        transition: border-color 0.3s ease;
        font-size: 16px;
      }
      .login-form input[type="password"]:focus {
        outline: none;
        border-color: #a4161a;
      }
      .login-form button {
        width: calc(100% - 40px);
        padding: 14px;
        background-color: #a4161a;
        color: #fff;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: background-color 0.3s ease;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 1px;
      }
      .login-form button:hover {
        background-color: #6d0e11;
      }
      .logo {
        position: absolute;
        top: -60px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }
      .logo img {
        max-width: 70%;
        max-height: 70%;
      }
      .password-hint {
        color: #6c757d;
        font-size: 17px;
        font-weight: 700;
        margin-bottom: 15px;
      }
      @-moz-keyframes my-animation {
        from {
          -moz-transform: translateY(100%);
        }
        to {
          -moz-transform: translateY(-100%);
        }
      }

      /* for Chrome */
      @-webkit-keyframes my-animation {
        from {
          -webkit-transform: translateY(100%);
        }
        to {
          -webkit-transform: translateY(-100%);
        }
      }

      @keyframes my-animation {
        from {
          -moz-transform: translateY(100%);
          -webkit-transform: translateY(100%);
          transform: translateY(100%);
        }
        to {
          -moz-transform: translateY(-100%);
          -webkit-transform: translateY(-100%);
          transform: translateY(-100%);
        }
      }

      .moving-text {
        position: absolute;
        bottom: -50px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 14px;
        color: #6c757d;
        animation: moveText 5s infinite alternate;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="logo">
        <img src="../images/logoblack.jpg" alt="Logo" />
      </div>
      <h2>Welcome Back!</h2>
      <form class="login-form" action="login.php" method="post">
        <input
          type="password"
          name="password"
          placeholder="Enter your password"
          required
        />
        <div class="password-hint">HINT: University name</div>
        <button type="submit">Login</button>
      </form>
    </div>
  </body>
</html>
